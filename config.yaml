# Vision Platform Configuration File
# ================================

# Application Settings
app:
  name: "Vision Platform Enterprise"
  version: "2.0.0"
  debug: true

# Camera Settings
camera:
  max_cameras: 4
  default_camera_count: 1
  cameras:
    - id: 0
      name: "Camera 1"
      enabled: true
      exposure: 100
      gain: 1.0
    - id: 1
      name: "Camera 2"
      enabled: false
      exposure: 100
      gain: 1.0
    - id: 2
      name: "Camera 3"
      enabled: false
      exposure: 100
      gain: 1.0
    - id: 3
      name: "Camera 4"
      enabled: false
      exposure: 100
      gain: 1.0

# PLC Settings
plc:
  enabled: true
  type: "tcp"  # tcp, modbus_tcp, modbus_rtu
  host: "192.168.1.100"
  port: 502
  device_id: 1
  timeout: 5000
  retry_count: 3
  
  # Signal Mapping
  signals:
    trigger_input: "I0.0"      # Trigger signal from PLC
    ok_output: "Q0.0"          # OK signal to PLC
    ng_output: "Q0.1"          # NG signal to PLC
    ready_output: "Q0.2"       # Ready signal to PLC
    busy_output: "Q0.3"        # Busy signal to PLC

# Inspection Tools Settings
tools:
  pattern:
    enabled: true
    threshold: 80
    method: "TM_CCOEFF_NORMED"
  
  presence:
    enabled: true
    threshold: 20
  
  brightness:
    enabled: true
    min_value: 50
    max_value: 200
  
  ocr:
    enabled: true
    language: "eng"
  
  color:
    enabled: true
    method: "HSV"
  
  blob:
    enabled: true
    threshold: 100
  
  measurement:
    enabled: true
    unit: "pixel"
  
  reference:
    enabled: true
    threshold: 70

# Database Settings
database:
  type: "sqlite"
  path: "database/vision.db"
  backup_enabled: true
  backup_interval: 3600  # seconds

# Image Logger Settings
image_logger:
  save_ok: true
  save_ng: true
  save_path: "images"
  max_images: 10000
  image_format: "jpg"
  quality: 90

# Recipe Settings
recipe:
  path: "recipes"
  auto_load_last: true

# UI Settings
ui:
  window_width: 1400
  window_height: 900
  theme: "dark"

# Inspection Settings
inspection:
  cycle_timeout: 3000  # ms
  ideal_cycle_time: 500  # ms
  auto_mode_interval: 500  # ms
  reference_tracking: true

# Logging & Audit
logging:
  enabled: true
  log_file: "audit_log.txt"
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  max_log_size: 10485760  # 10MB

# User Management
user_management:
  password_hash: "sha256"
  min_password_length: 4
  default_users:
    - username: "admin"
      password: "1234"
      role: "Admin"
    - username: "engineer"
      password: "1234"
      role: "Engineer"

# Performance
performance:
  thread_pool_size: 4
  cache_enabled: true
  cache_size: 100

# Export Settings
export:
  csv_enabled: true
  pdf_enabled: true
  export_path: "exports"
